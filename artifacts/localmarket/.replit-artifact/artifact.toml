kind = "web"
previewPath = "/"
title = "LocalMarket"
version = "1.0.0"
id = "artifacts/localmarket"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26010

[services.development]
run = "pnpm --filter @workspace/localmarket run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/localmarket", "run", "build" ]
publicDir = "artifacts/localmarket/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26010"
BASE_PATH = "/"
