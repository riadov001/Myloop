# ============================================================
# Nginx — LocalMarket (Hostinger VPS)
# Remplacez VOTRE_DOMAINE.fr par votre vrai domaine.
# Placez ce fichier dans /etc/nginx/sites-available/localmarket
# puis : sudo ln -s /etc/nginx/sites-available/localmarket /etc/nginx/sites-enabled/
# ============================================================

# Redirection HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name VOTRE_DOMAINE.fr www.VOTRE_DOMAINE.fr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name VOTRE_DOMAINE.fr www.VOTRE_DOMAINE.fr;

    # --- SSL (Certbot / Let's Encrypt) ---
    ssl_certificate     /etc/letsencrypt/live/VOTRE_DOMAINE.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/VOTRE_DOMAINE.fr/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Sécurité ---
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;

    # --- Logs ---
    access_log /var/log/nginx/localmarket_access.log;
    error_log  /var/log/nginx/localmarket_error.log;

    # --- Compression Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript
               application/rss+xml application/atom+xml image/svg+xml;

    # --- API — proxy vers Node.js / PM2 ---
    location /api {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Rate limiting basique
        limit_req zone=api burst=30 nodelay;
    }

    # --- Frontend React (fichiers statiques) ---
    root /var/www/localmarket/public;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Cache long durée pour les assets (JS/CSS/images) ---
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # --- Taille max upload ---
    client_max_body_size 10M;
}

# Zone de rate limiting (à définir dans nginx.conf global, bloc http)
# limit_req_zone $binary_remote_addr zone=api:10m rate=60r/m;
